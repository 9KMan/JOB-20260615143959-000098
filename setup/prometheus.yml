# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'scraper'
    env: '${APP_ENV:-development}'

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus Self-Monitoring
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # ---------------------------------------------------------------------------
  # RabbitMQ Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: /metrics
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Scraper Worker Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'scraper-workers'
    static_configs:
      - targets: ['worker:8001']
    metrics_path: /metrics
    scrape_interval: 10s

  # ---------------------------------------------------------------------------
  # API Metrics
  # ---------------------------------------------------------------------------
  - job_name: 'scraper-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: /metrics
    scrape_interval: 15s

  # ---------------------------------------------------------------------------
  # PostgreSQL via PGBouncer Exporter (optional)
  # ---------------------------------------------------------------------------
  - job_name: 'pgbouncer'
    static_configs:
      - targets: ['pgbouncer:9100']
    metrics_path: /metrics
    scrape_interval: 30s

  # ---------------------------------------------------------------------------
  # Node Exporter (system metrics)
  # ---------------------------------------------------------------------------
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    metrics_path: /metrics
    scrape_interval: 30s
